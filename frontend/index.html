<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>AquaRisk — Telangana Groundwater Quality Risk Assessment</title>
    <meta
      name="description"
      content="Assess a groundwater sample's drinking safety against BIS 10500, its irrigation suitability on the USSL grid, and whether its chemistry is unusual. Trained on 1,106 post-monsoon wells across 33 Telangana districts."

    <!-- Favicons. SVG first for browsers that take it (it stays crisp at any
         size); the 32px PNG is the fallback for Safari and older engines. -->

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- The browser chrome picks these up — the address bar tints to match
         the app rather than sitting in default grey. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2efe6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#08181f" />

    <!-- Link previews, for when this gets shared. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AquaRisk — Telangana Groundwater Quality Risk Assessment" />
    <meta
      property="og:description"
      content="62% of wells in this dataset exceed at least one BIS drinking-water limit. Three models assess a sample's chemistry: drinking safety, irrigation suitability, and whether the reading itself can be trusted."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
