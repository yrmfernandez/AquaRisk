<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- AquaRisk: a well section.
       Ground, strata line, water table, and the sample point on it.
       Same mark as the nav wordmark — one idea, used consistently.

       The tab bar can be light or dark and we don't get a media query
       for it reliably, so the mark carries its own dark ground. It
       reads either way. -->

  <rect width="32" height="32" rx="7" fill="#0b2027"/>

  <!-- Strata: the dry ground above the water table -->
  <path d="M3 12h26" stroke="#3f5a63" stroke-width="1.2" stroke-linecap="round"/>

  <!-- The bore, dropping from the surface to the sample depth -->
  <path d="M16 3.5v7" stroke="#8aa3aa" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Water table: the aquifer, in the safe teal of the risk ramp -->
  <path d="M3 19.5c4.3 0 4.3-2.4 8.7-2.4s4.3 2.4 8.7 2.4 4.3-2.4 8.7-2.4"
        stroke="#3d8b8b" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M3 24.5c4.3 0 4.3-2.4 8.7-2.4s4.3 2.4 8.7 2.4 4.3-2.4 8.7-2.4"
        stroke="#3d8b8b" stroke-width="1.6" stroke-linecap="round" fill="none"
        opacity="0.45"/>

  <!-- The sample point: where the bore meets the water -->
  <circle cx="16" cy="19.1" r="3.4" fill="#3d8b8b"/>
  <circle cx="16" cy="19.1" r="1.3" fill="#0b2027"/>
</svg>
